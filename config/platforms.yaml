# Per-platform style, limits, and TEMPLATE OPTIONS. Drafters read this so rules
# live in config, not code. Edit tone/limits/templates here without touching Python.
#
# `formats:` is a list of template options per platform. The dashboard shows a
# picker; the FIRST entry is the default. Each: id, name, template. `template`
# is your exact structure — it overrides the general `style`. Add your own by
# appending another entry.

instagram:
  label: Instagram
  style: >
    Short, punchy market caption. A little emoji. Not a long post.
  formats:
    - id: alert
      name: Market Alert (default)
      template: |
        Keep it SHORT — just a few lines. Follow this structure:

        🚨 [Punchy headline ending with "!"]
        [1-2 concise sentences: state the news, add a "Plan your trades in advance"
        style line, and credit the brand "The Market Tales".]

        (Hashtags are added separately — ALWAYS include #TheMarketTales among them.)
    - id: explainer
      name: Mini explainer
      template: |
        Short and clear. Structure:

        📌 [Hook headline — the news in a few punchy words]
        Here's what it means 👇
        • [point 1 — a concrete consequence]
        • [point 2 — who it affects]
        • [point 3 — the investor takeaway]
        [one-line CTA, credit "The Market Tales".]

        (Hashtags added separately — ALWAYS include #TheMarketTales.)
    - id: numbers
      name: Number-led
      template: |
        Lead with the number. Structure:

        📊 [THE KEY NUMBER / MOVE, big and bold as the first line]
        [1 line: what the number is.]
        [1-2 lines: why it matters and who it hits.]
        [one-line CTA, credit "The Market Tales".]

        (Hashtags added separately — ALWAYS include #TheMarketTales.)
  always_hashtags:
    - "TheMarketTales"
  mentions:
    - "@nseindia"
    - "@bseindia"
    - "@moneycontrolcom"
    - "@cnbctv18india"
    - "@etmarkets"
    - "@livemint"
    - "@business_today"
  caption_max_chars: 2200
  hashtags_min: 3
  hashtags_max: 5
  needs_image: true

twitter:
  label: Twitter/X
  style: >
    Single tweet, finance-analyst voice. No thread.
  formats:
    - id: analytical
      name: Analytical take (default)
      template: |
        Write ONE analytical tweet — a sharp market take, NOT a topic label.

        NEVER write shallow posts like "Crude Oil is trending today #CrudeOil
        #StockMarket". Instead:
        - Open with a concrete hook: a specific number/move framed as a question,
          e.g. "Crude oil rising 5% — really bad for Indian stocks?".
        - Give a specific, contrarian-aware insight: name who is hurt AND who
          benefits (sectors or specific companies), e.g. "Aviation & paint face
          margin pressure, while upstream producers like ONGC benefit".
        - Close with an investor-framing question, e.g. "temporary or sustained?".

        Use a few relevant emojis for punch — 🚨 alert, 📈/📉 moves, ⚠️ risk,
        🛢️/✈️ sectors. 2-4 emojis, tasteful. Concrete, specific — only verified
        facts from the brief.

        HARD LIMIT: fit within 280 characters (free X account); count each emoji
        as 2 characters. Aim for ~260.
    - id: hot_take
      name: Hot take
      template: |
        Write ONE punchy hot take — a sharp, confident opinion, not a summary.

        - Lead with the opinion in the first few words (a bold, specific claim).
        - Back it with ONE concrete reason (a number, a name, a mechanism).
        - Optional 1-2 emojis for punch (🔥 📉 ⚠️).

        Confident but honest — never hype or invent facts. Keep within 280 chars
        (count each emoji as 2). Aim for ~240.
    - id: question
      name: Question hook
      template: |
        Write ONE tweet that opens with a provocative, specific question, then
        answers it crisply with data.

        - Line 1: a sharp question naming the specific stock/sector/number.
        - Then: a 1-2 line data-backed answer with who wins/loses.
        - 1-2 emojis max.

        Only verified facts. Within 280 chars (emoji = 2 chars). Aim for ~260.
  caption_max_chars: 280
  count_emoji_double: true
  hashtags_min: 0
  hashtags_max: 3
  needs_image: false

linkedin:
  label: LinkedIn
  style: >
    Finance/analyst voice. Short lines, generous whitespace, emoji headers.
  formats:
    - id: storytelling
      name: Storytelling (default)
      template: |
        Follow THIS exact storytelling structure. Short lines. A blank line between
        every block. Use the emoji section headers exactly as shown. Fill the
        brackets from the brief/angle — never invent facts. Do NOT put hashtags in
        the caption (they are handled separately).

        🚨 [Subject]: [a contrarian one-line hook that reframes the story]

        [One setup line, e.g. "For years, investors saw a dream story:"]

        ✨ [strength / promise 1]
        🌍 [strength / promise 2]
        📈 [strength / promise 3]
        [a short line like "Everything looked perfect..."]

        Until one question changed everything:
        "[the single pivotal question, in quotes]"

        📉 What Happened?
        [3-5 short factual lines: the event, the key numbers (₹ / % / dates), and
        the consequence — each on its own line]

        ⚠️ The Bigger Lesson

        Most [people/investors] focus on:
        [thing] [emoji]
        [thing] [emoji]
        [thing] [emoji]
        But often ignore:
        [overlooked factor]
        [overlooked factor]
        [overlooked factor]

        💡 The Hidden Truth: [short setup]
        [punchy line]
        [punchy line]
        [punchy line]
        But if [the fragile thing] breaks...
        Everything else can collapse.

        Because in [domain]:
        [A] creates [surface effect].
        [B] creates [confidence].
        [the real driver] creates [the ultimate outcome].

        🎯 Final Thought
        [2-4 reflective closing lines that land the core lesson plainly]
    - id: listicle
      name: Key points breakdown
      template: |
        Short lines, blank line between blocks. Emoji headers. Facts only from the
        brief. No hashtags in the caption (handled separately).

        🔍 [Subject]: [one-line hook framing the story]

        Here's what actually happened 👇

        1️⃣ [key point — a fact with a number/name]
        2️⃣ [key point]
        3️⃣ [key point]
        4️⃣ [key point]

        💡 What it means for investors:
        [2-3 short takeaway lines — who is affected and how]

        🎯 [one-line closing takeaway]
    - id: contrarian
      name: Contrarian take
      template: |
        Short lines, blank line between blocks. Facts only from the brief. No
        hashtags in the caption (handled separately).

        🚨 [Subject]: [the popular belief stated plainly]

        Everyone thinks:
        [the common assumption in 1-2 lines]

        But here's what the data actually shows 📊
        [2-4 short factual lines with numbers/names that complicate or reverse it]

        ⚠️ Why it matters:
        [2-3 lines on the real risk/opportunity investors are missing]

        🎯 The takeaway:
        [2-3 reflective closing lines]
  caption_max_chars: 3000
  caption_min_chars: 1200
  hashtags_min: 5
  hashtags_max: 10
  needs_image: true
