# Per-platform style + hard limits. Drafters read this so rules live in config,
# not code. Edit tone/limits here without touching Python.
#
# `format:` is YOUR custom template — paste your exact structure/example here
# and it OVERRIDES the general `style`. Leave blank to use the default style.
# You can use section labels, line-by-line structure, or a full example post.

instagram:
  label: Instagram
  style: >
    Short, punchy market-alert caption. A little emoji. Not a long post.
  format: |
    Keep it SHORT — just a few lines. Follow this structure:

    🚨 [Punchy headline ending with "!"]
    [1-2 concise sentences: state the news, add a "Plan your trades in advance"
    style line, and credit the brand "The Market Tales".]

    (Hashtags are added separately — ALWAYS include #TheMarketTales among them.)
  # Fixed account tags appended verbatim to the caption (never model-generated).
  mentions:
    - "@nseindia"
    - "@bseindia"
    - "@moneycontrolcom"
    - "@cnbctv18india"
    - "@etmarkets"
    - "@livemint"
    - "@business_today"
  caption_max_chars: 2200
  hashtags_min: 3
  hashtags_max: 5
  needs_image: true

twitter:
  label: Twitter/X
  style: >
    Single short burst. One sharp hook line that stands alone. No thread.
    Punchy, opinionated, quotable. At most 2 hashtags. Fit comfortably under
    the limit — do not pad to fill it.
  format: ""     # <- paste your tweet format here
  caption_max_chars: 280
  hashtags_min: 0
  hashtags_max: 2
  needs_image: false

linkedin:
  label: LinkedIn
  style: >
    Storytelling, finance/analyst voice. Short lines, generous whitespace,
    emoji-prefixed section headers.
  format: |
    Follow THIS exact storytelling structure. Short lines. A blank line between
    every block. Use the emoji section headers exactly as shown. Fill the
    brackets from the brief/angle — never invent facts. Do NOT put hashtags in
    the caption (they are handled separately).

    🚨 [Subject]: [a contrarian one-line hook that reframes the story]

    [One setup line, e.g. "For years, investors saw a dream story:"]

    ✨ [strength / promise 1]
    🌍 [strength / promise 2]
    📈 [strength / promise 3]
    [a short line like "Everything looked perfect..."]

    Until one question changed everything:
    "[the single pivotal question, in quotes]"

    📉 What Happened?
    [3-5 short factual lines: the event, the key numbers (₹ / % / dates), and
    the consequence — each on its own line]

    ⚠️ The Bigger Lesson

    Most [people/investors] focus on:
    [thing] [emoji]
    [thing] [emoji]
    [thing] [emoji]
    But often ignore:
    [overlooked factor]
    [overlooked factor]
    [overlooked factor]

    💡 The Hidden Truth: [short setup]
    [punchy line]
    [punchy line]
    [punchy line]
    But if [the fragile thing] breaks...
    Everything else can collapse.

    Because in [domain]:
    [A] creates [surface effect].
    [B] creates [confidence].
    [the real driver] creates [the ultimate outcome].

    🎯 Final Thought
    [2-4 reflective closing lines that land the core lesson plainly]
  caption_max_chars: 3000
  caption_min_chars: 1200
  hashtags_min: 5
  hashtags_max: 10
  needs_image: true
